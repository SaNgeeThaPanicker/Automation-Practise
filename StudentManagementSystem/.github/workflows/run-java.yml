name: Run Java Application

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java code
        run: javac -d . Automation-Practise/StudentManagementSystem/Main.java

      - name: Run Main Method
        run: java StudentManagementSystem.Main